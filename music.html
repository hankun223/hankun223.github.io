<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐 — 高坤涵</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .hobby-page {
      padding: 120px 48px 100px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 40px;
      font-size: 15px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--transition);
    }
    .back-link:hover { color: var(--accent); }

    .page-heading {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 64px;
    }
    .page-icon { font-size: 44px; }
    .page-title {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
    }

    .music-section {
      margin-bottom: 72px;
    }
    .music-subtitle {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      margin-bottom: 32px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    /* ===== 精选歌曲卡片 ===== */
    .song-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .song-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition), transform var(--transition);
    }
    .song-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
    }

    .song-cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }

    .song-info {
      padding: 20px 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .song-title-link {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      transition: opacity var(--transition);
    }
    .song-title-link:hover { opacity: 0.75; }

    .song-artist {
      font-size: 13px;
      color: var(--text-muted);
    }

    .song-tag {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      padding: 3px 12px;
      border-radius: 20px;
      background: rgba(155, 58, 138, 0.08);
      color: var(--accent);
      border: 1px solid rgba(155, 58, 138, 0.22);
      width: fit-content;
    }

    .play-hint {
      font-size: 11px;
      color: var(--accent);
      opacity: 0.55;
      letter-spacing: 0.3px;
    }

    /* ===== 循环歌单 ===== */
    .loop-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .loop-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: 10px;
      transition: border-color var(--transition);
    }
    .loop-item:hover {
      border-color: var(--border);
    }

    .loop-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.5;
      flex-shrink: 0;
    }

    .loop-artist {
      font-size: 14px;
      color: var(--text-muted);
    }

    .loop-song-link {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      text-decoration: none;
      transition: color var(--transition);
    }
    .loop-song-link:hover { color: var(--accent); }

    .loop-tag {
      margin-left: auto;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 20px;
      background: rgba(155, 58, 138, 0.08);
      color: var(--accent);
      border: 1px solid rgba(155, 58, 138, 0.22);
      white-space: nowrap;
    }

    @media (max-width: 700px) {
      .hobby-page { padding: 88px 20px 60px; }
      .song-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="nav-logo" style="text-decoration:none;">高坤涵</a>
    <ul class="nav-links">
      <li><a href="../index.html#about">基本情况</a></li>
      <li><a href="../index.html#hobbies">兴趣爱好</a></li>

    </div>
  </main>

</body>
